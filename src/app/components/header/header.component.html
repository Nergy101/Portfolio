<mat-toolbar class="app-toolbar">
  <mat-toolbar-row class="main-row">
    <div class="logo-section">
      <img
        class="brand-logo"
        src="/assets/nemic-logos/Logo_Nemic-40.png"
        alt="Logo" />
      <span class="brand-text">{{ 'header.brand' | translate }}</span>
      <app-language-switcher
        class="mobile-language-switcher"
        [showOnlyFlag]="true"></app-language-switcher>
    </div>

    <div
      class="quick-links desktop-only"
      [attr.aria-label]="'sidebar.navigation' | translate">
      <button
        mat-button
        class="quick-link"
        type="button"
        (click)="navigateToFragment('techs-and-tools')">
        {{ 'header.quick-techs' | translate }}
      </button>
      <button
        mat-button
        class="quick-link"
        type="button"
        (click)="navigateToFragment('projects')">
        {{ 'header.quick-projects' | translate }}
      </button>
    </div>

    <div class="right-actions desktop-only">
      <div class="badge-container">
        <a
          href="https://github.com/Nergy101/Portfolio/actions/workflows/pipeline.yml"
          target="_blank"
          rel="noopener">
          <img
            src="https://github.com/Nergy101/Portfolio/actions/workflows/pipeline.yml/badge.svg"
            alt="{{ 'header.deploy-badge-alt' | translate }}" />
        </a>
        <a
          href="https://github.com/Nergy101/Portfolio/actions/workflows/e2e-nightly.yml"
          target="_blank"
          rel="noopener">
          <img
            src="https://github.com/Nergy101/Portfolio/actions/workflows/e2e-nightly.yml/badge.svg"
            alt="{{ 'header.e2e-nightly-badge-alt' | translate }}" />
        </a>
      </div>

      <button mat-flat-button class="coffee-button" (click)="openKofiDialog()">
        <mat-icon
          aria-hidden="false"
          [attr.aria-label]="'aria.donate' | translate">
          volunteer_activism
        </mat-icon>
        <span class="button-text">{{ 'header.buy-me-coffee' | translate }}</span>
        <mat-icon
          class="coffee-icon"
          aria-hidden="false"
          [attr.aria-label]="'aria.coffee' | translate">
          coffee
        </mat-icon>
      </button>
      <app-language-switcher></app-language-switcher>
    </div>
  </mat-toolbar-row>

  <mat-toolbar-row class="mobile-buttons-row mobile-only">
    <div class="header-buttons mobile-buttons">
      <div class="mobile-quick-links">
        <button
          mat-button
          class="quick-link"
          type="button"
          (click)="navigateToFragment('techs-and-tools')">
          {{ 'header.quick-techs' | translate }}
        </button>
        <button
          mat-button
          class="quick-link"
          type="button"
          (click)="navigateToFragment('projects')">
          {{ 'header.quick-projects' | translate }}
        </button>
      </div>

      <div class="badge-container">
        <a
          href="https://github.com/Nergy101/Portfolio/actions/workflows/pipeline.yml"
          target="_blank"
          rel="noopener">
          <img
            src="https://github.com/Nergy101/Portfolio/actions/workflows/pipeline.yml/badge.svg"
            alt="{{ 'header.deploy-badge-alt' | translate }}" />
        </a>
      </div>

      <button mat-flat-button class="coffee-button" (click)="openKofiDialog()">
        <mat-icon
          aria-hidden="false"
          [attr.aria-label]="'aria.donate' | translate">
          volunteer_activism
        </mat-icon>
        <span class="button-text">{{ 'header.buy-me-coffee-short' | translate }}</span>
        <mat-icon
          class="coffee-icon"
          aria-hidden="false"
          [attr.aria-label]="'aria.coffee' | translate">
          coffee
        </mat-icon>
      </button>
    </div>
  </mat-toolbar-row>
</mat-toolbar>
